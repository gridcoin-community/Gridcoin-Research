name: CMake Compatibility Builds

on:
  # Trigger on any push/PR to any branch (matches production/compatibility workflows)
  push:
    branches:
      - '**'
    tags:
      - "v*"
      - "5.*"
  pull_request:
    branches:
      - '**'
  # Manual trigger for debugging
  workflow_dispatch:

env:
  # Global settings for all jobs
  BUILD_TYPE: RelWithDebInfo
  USE_CCACHE: true
  # Match the `path: ~/.ccache` declared by each job's actions/cache step.
  # ccache 4.x defaults to ~/.cache/ccache, so without this override the
  # builds write to a directory the cache action never sees and no caching
  # actually happens.
  CCACHE_DIR: /home/runner/.ccache

jobs:
  # ----------------------------------------------------------------------
  # JOB 1: Linux Native
  # ----------------------------------------------------------------------
  linux-native:
    name: Linux Native (System Qt6)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Dependencies
        run: |
          source ./install_dependencies.sh
          install_deps native true true

      - name: Setup Concurrency
        run: |
          if [ -z "$CMAKE_BUILD_PARALLEL_LEVEL" ]; then
            echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV
            echo "CTEST_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV
            echo "Concurrency: Auto-detected $(nproc) cores."
          else
            echo "Concurrency: Limit set externally to $CMAKE_BUILD_PARALLEL_LEVEL."
          fi

      # Configure Ccache (Enables caching on GitHub & uses mapped volume on Local)
      - name: Configure Ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-compat-native-${{ github.sha }}
          restore-keys: ccache-compat-native-

      - name: Configure CMake
        run: |
          cmake -B build_native \
            -DENABLE_GUI=ON \
            -DENABLE_QRENCODE=ON \
            -DUSE_DBUS=ON \
            -DENABLE_UPNP=ON \
            -DDEFAULT_UPNP=ON \
            -DENABLE_PIE=ON \
            -DENABLE_DOCS=OFF \
            -DENABLE_TESTS=ON \
            -DUSE_QT6=ON \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build_native

      - name: Test
        run: ctest --test-dir build_native --output-on-failure

  # -------------------------------------------------------------------------
  # JOB 2: Linux ARM64
  # -------------------------------------------------------------------------
  linux-arm64-system:
    name: Linux ARM64 (System Qt6)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Add ARM64 Architecture
        run: |
          sudo dpkg --add-architecture arm64
          # Remove all existing sources and write clean amd64-only + arm64 config.
          # The runner image adds sources (microsoft-prod, azure-cli, ubuntu) with
          # varying formats that break when arm64 is added as an architecture.
          sudo rm -f /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list
          cat <<'EOF' | sudo tee /etc/apt/sources.list.d/ubuntu-amd64.sources
          Types: deb
          URIs: http://azure.archive.ubuntu.com/ubuntu
          Suites: noble noble-updates noble-backports
          Components: main universe multiverse restricted
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://security.ubuntu.com/ubuntu
          Suites: noble-security
          Components: main universe multiverse restricted
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          cat <<'EOF' | sudo tee /etc/apt/sources.list.d/arm64.list
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe multiverse restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe multiverse restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main universe multiverse restricted
          EOF
          sudo apt-get update

      - name: Install ARM64 Toolchain & Qt6
        run: |
          sudo dpkg --remove --force-all libcurl4-openssl-dev libcurl4-gnutls-dev libcups2 libcups2t64 || true
          sudo apt-get update
          sudo apt-get -f install -y
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build zipcmp zipmerge ziptool qemu-user-static \
            g++-aarch64-linux-gnu qt6-base-dev:arm64 qt6-charts-dev:arm64 qt6-svg-dev:arm64 \
            qt6-l10n-tools qt6-tools-dev:arm64 qt6-tools-dev-tools:arm64 \
            libqt6core5compat6-dev:arm64 libssl-dev:arm64 libzip-dev:arm64 \
            libcurl4-openssl-dev:arm64 libboost-system-dev:arm64 libboost-filesystem-dev:arm64 \
            libboost-thread-dev:arm64 libboost-iostreams-dev:arm64 libboost-program-options-dev:arm64 \
            libboost-serialization-dev:arm64 libboost-chrono-dev:arm64 libboost-test-dev:arm64 \
            libminiupnpc-dev:arm64 libqrencode-dev:arm64 libxkbcommon-dev:arm64 \
            libcups2t64:arm64 \
            ccache

      - name: Setup Concurrency
        run: |
          if [ -z "$CMAKE_BUILD_PARALLEL_LEVEL" ]; then
            echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV
            echo "CTEST_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV
            echo "Concurrency: Auto-detected $(nproc) cores."
          else
            echo "Concurrency: Limit set externally to $CMAKE_BUILD_PARALLEL_LEVEL."
          fi

      - name: Configure Ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-compat-arm64-${{ github.sha }}
          restore-keys: ccache-compat-arm64-

      - name: Configure CMake (Cross)
        run: |
          cmake -B build_arm64 -GNinja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH="/usr/lib/aarch64-linux-gnu;/usr/include/aarch64-linux-gnu" \
            -DCMAKE_SYSROOT=/ \
            -DENABLE_GUI=ON \
            -DUSE_QT6=ON \
            -DQt6_DIR=/usr/lib/aarch64-linux-gnu/cmake/Qt6 \
            -DENABLE_TESTS=ON \
            -DCMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/qemu-aarch64-static \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build_arm64

      - name: Test (QEMU Emulation)
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build_arm64 --output-on-failure

  # -------------------------------------------------------------------------
  # JOB 3: Linux ARMhf
  # -------------------------------------------------------------------------
  linux-armhf-system:
    name: Linux ARMhf (System Qt6)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm/v7

      - name: Add ARMhf Architecture
        run: |
          sudo dpkg --add-architecture armhf
          sudo add-apt-repository -y universe
          sudo add-apt-repository -y multiverse
          sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          cat <<EOF | sudo tee /etc/apt/sources.list.d/armhf.list
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble main universe multiverse restricted
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe multiverse restricted
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-security main universe multiverse restricted
          EOF
          sudo apt-get update

      - name: Install ARMhf Toolchain & Qt6
        run: |
          sudo dpkg --remove --force-all libcurl4-openssl-dev libcurl4-gnutls-dev libcups2 libcups2t64 || true
          sudo apt-get update
          sudo apt-get -f install -y
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build zipcmp zipmerge ziptool qemu-user-static \
            g++-arm-linux-gnueabihf qt6-base-dev:armhf qt6-charts-dev:armhf qt6-svg-dev:armhf \
            qt6-l10n-tools:armhf qt6-tools-dev:armhf qt6-tools-dev-tools:armhf \
            libqt6core5compat6-dev:armhf libssl-dev:armhf libzip-dev:armhf \
            libcurl4-openssl-dev:armhf libboost-system-dev:armhf libboost-filesystem-dev:armhf \
            libboost-thread-dev:armhf libboost-iostreams-dev:armhf libboost-program-options-dev:armhf \
            libboost-serialization-dev:armhf libboost-chrono-dev:armhf libboost-test-dev:armhf \
            libminiupnpc-dev:armhf libqrencode-dev:armhf libxkbcommon-dev:armhf \
            libcups2t64:armhf \
            ccache

      - name: Setup Concurrency
        run: |
          if [ -z "$CMAKE_BUILD_PARALLEL_LEVEL" ]; then
            echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV
            echo "CTEST_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV
            echo "Concurrency: Auto-detected $(nproc) cores."
          else
            echo "Concurrency: Limit set externally to $CMAKE_BUILD_PARALLEL_LEVEL."
          fi

      - name: Configure Ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-compat-armhf-${{ github.sha }}
          restore-keys: ccache-compat-armhf-

      - name: Configure CMake (Cross)
        run: |
          cmake -B build_armhf -GNinja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=arm \
            -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
            -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
            -DCMAKE_FIND_ROOT_PATH="/usr/lib/arm-linux-gnueabihf;/usr/include/arm-linux-gnueabihf" \
            -DCMAKE_SYSROOT=/ \
            -DQt6_DIR=/usr/lib/arm-linux-gnueabihf/cmake/Qt6 \
            -DENABLE_TESTS=ON \
            -DENABLE_GUI=ON \
            -DUSE_QT6=ON \
            -DCMAKE_CROSSCOMPILING_EMULATOR=/usr/bin/qemu-arm-static \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build_armhf

      - name: Test (QEMU Emulation)
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build_armhf --output-on-failure
