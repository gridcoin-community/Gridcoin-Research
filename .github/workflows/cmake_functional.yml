name: CMake Functional Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  # Pin ccache's dir to the actions/cache path below. ccache's default dir is
  # version/state-dependent (~/.ccache vs ~/.cache/ccache), so without this the
  # cache can silently miss. Mirrors cmake_quality.yml.
  CCACHE_DIR: /home/runner/.ccache

jobs:
  # ----------------------------------------------------------------------
  # Build gridcoinresearchd (daemon only, no GUI) and run the Python
  # functional test suite (test/functional) against a -regtest node.
  # Phase 4 — refs #2932.
  # ----------------------------------------------------------------------
  functional-tests:
    name: Functional Tests (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # Guarantee a Python 3 interpreter so the functional_tests CTest case is
      # registered (CMake only warns, it does not fail, if Python3 is missing).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          source ./install_dependencies.sh
          # WITH_GUI=false: this is a daemon-only (-DENABLE_GUI=OFF) build, so skip
          # the Qt/GUI dependency set.
          install_deps native true false

      - name: Setup Concurrency
        run: |
          if [ -z "$CMAKE_BUILD_PARALLEL_LEVEL" ]; then
            echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV
            echo "Concurrency: Auto-detected $(nproc) cores."
          else
            echo "Concurrency: Limit set externally to $CMAKE_BUILD_PARALLEL_LEVEL."
          fi

      - name: Configure Ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-functional-${{ github.sha }}
          restore-keys: ccache-functional-

      # GUI off keeps the build daemon-only and Qt-free (find_package(Qt) is
      # gated on ENABLE_GUI). ENABLE_TESTS=ON registers the functional_tests
      # CTest case; ENABLE_DAEMON=ON builds gridcoinresearchd.
      - name: Configure CMake
        run: |
          cmake -B build \
            -DENABLE_GUI=OFF \
            -DENABLE_TESTS=ON \
            -DENABLE_DAEMON=ON \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build gridcoinresearchd
        run: cmake --build build --target gridcoinresearchd

      # The functional_tests case carries GRIDCOIND/GRIDCOINCLI env overrides
      # (set in the top-level CMakeLists) pointing at build/bin/gridcoinresearchd.
      # --no-tests=error fails the job if the functional_tests case never
      # registered (ctest -R otherwise exits 0 when nothing matches).
      - name: Run functional tests
        run: ctest --test-dir build -R functional_tests --output-on-failure --no-tests=error
